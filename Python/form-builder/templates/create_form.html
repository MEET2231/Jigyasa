<h1>Create a New Form</h1>
<form method="POST">
    <label for="form_name">Form Name:</label>
    <input type="text" name="form_name" required><br>
    <label for="fields">Fields:</label><br>
    <input type="text" name="fields" placeholder="Field 1">
    <input type="text" name="fields" placeholder="Field 2"><br>
    <button type="submit">Create Form</button>
</form>
